name: Deploy to Pi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Sync static files
        run: |
          mkdir -p /home/philip/nginx-proxy/html/rootpicker
          rsync -a --delete ./dist/ /home/philip/nginx-proxy/html/rootpicker/
