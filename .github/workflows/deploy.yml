name: Deploy to Pi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Sync static files
        run: |
          mkdir -p /home/philip/nginx-proxy/html/rootpicker
          rsync -a --delete --exclude='.git' --exclude='.github' --exclude='factions.png' \
            ./ /home/philip/nginx-proxy/html/rootpicker/
